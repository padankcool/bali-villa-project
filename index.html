<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Ubud Haven</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { display: none; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 antialiased min-h-screen">

    <nav class="bg-stone-900 text-white px-6 py-4 flex items-center justify-between shadow-md">
        <div class="flex items-center space-x-3">
            <span class="text-xl font-serif tracking-widest font-bold">UBUD HAVEN</span>
            <span class="bg-amber-600 text-[10px] uppercase font-bold px-2 py-0.5 rounded tracking-wider">ADMIN PORTAL</span>
        </div>
        <div class="flex items-center space-x-4">
            <span id="adminEmail" class="text-xs text-stone-400 font-mono">Memuat...</span>
            <button onclick="logout()" class="text-xs bg-stone-800 hover:bg-stone-700 border border-stone-700 px-3 py-1.5 rounded transition font-medium">
                KELUAR
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-serif text-stone-900 font-bold">Kelola Reservasi Villa</h1>
                <p class="text-xs text-stone-500 mt-1 uppercase tracking-wider">Daftar permintaan booking masuk dari sistem kustomer.</p>
            </div>
            <button onclick="ambilSemuaReservasi()" class="self-start bg-white border border-stone-300 hover:border-stone-900 text-stone-700 hover:text-stone-900 px-4 py-2 text-xs rounded-lg font-medium transition shadow-sm flex items-center gap-2">
                🔄 Segarkan Data
            </button>
        </div>

        <div class="bg-white rounded-xl border border-stone-200 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-stone-50 border-b border-stone-200 text-stone-500 text-xs uppercase tracking-wider font-semibold">
                            <th class="p-4">ID / Tamu</th>
                            <th class="p-4">Tipe Villa</th>
                            <th class="p-4">Tanggal Menginap</th>
                            <th class="p-4">Status</th>
                            <th class="p-4 text-center">Aksi Konfirmasi</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <tr>
                            <td colspan="5" class="p-8 text-center text-stone-400">Sedang mengambil data reservasi...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://vvgchnwafsiouqsshrfb.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2Z2NobndhZnNpb3Vxc3NocmZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3OTUwNTcsImV4cCI6MjA5ODM3MTA1N30.bC-GO4HHdBo4zxNfJZ4BDmIPfQKlzA6d_9g_-ThPBoc"; 

        const token = localStorage.getItem('supabase_token');
        const emailAktif = localStorage.getItem('user_logged_email');

        // ========================================================
        // 🚨 FITUR SATPAM MUTAKHIR: CEK OTORISASI SEBELUM RENDER PAGE
        // ========================================================
        async function jalankanSatpamAdmin() {
            if (!token || !emailAktif) {
                localStorage.clear();
                window.location.href = '/';
                return;
            }

            // Jalur Tol Khusus Super Admin Bli (Langsung Lolos)
            if (emailAktif === 'admin1@villabali.com') {
                bukaAksesHalaman();
                return;
            }

            try {
                // Cek apakah email terdaftar di tabel user_roles
                const response = await fetch(`${SUPABASE_URL}/rest/v1/user_roles?email=eq.${encodeURIComponent(emailAktif)}`, {
                    method: 'GET',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok && data && data.length > 0) {
                    // Terbukti staf/admin -> Lolos gembok!
                    bukaAksesHalaman();
                } else {
                    // Customer nakal ganti URL -> Tendang keras!
                    tendangCustomerNakal();
                }
            } catch (error) {
                tendangCustomerNakal();
            }
        }

        function bukaAksesHalaman() {
            document.body.style.display = 'block'; // Tampilkan layout HTML
            document.getElementById('adminEmail').innerText = emailAktif;
            ambilSemuaReservasi(); // Load data tabel
        }

        function tendangCustomerNakal() {
            // Tidak perlu pakai alert lagi, langsung lempar secara senyap & elegan ke halaman rejected
            window.location.href = 'rejected.html'; 
        }

        // Jalankan Satpam Detik Ini Juga
        jalankanSatpamAdmin();


        // ========================================================
        // 📊 MANAJEMEN DATA TABEL RESERVASI
        // ========================================================
        async function ambilSemuaReservasi() {
            const tbody = document.getElementById('adminTableBody');
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/reservasi_villa?order=id.desc`, {
                    method: 'GET',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-stone-400">Belum ada data booking masuk dari kustomer.</td></tr>`;
                    return;
                }

                tbody.innerHTML = '';
                data.forEach(booking => {
                    let badgeStatus = "";
                    let tombolAksi = "";

                    if (booking.status === 'Pending Payment') {
                        badgeStatus = `<span class="bg-amber-50 text-amber-700 border border-amber-200 px-2.5 py-1 rounded-full text-xs font-medium">⏳ Menunggu Bayar</span>`;
                        tombolAksi = `<span class="text-xs text-stone-400 italic">Menunggu customer klik bayar (10 mnt)</span>`;
                    } else if (booking.status === 'Paid (Awaiting Approval)') {
                        badgeStatus = `<span class="bg-blue-50 text-blue-700 border border-blue-200 px-2.5 py-1 rounded-full text-xs font-bold animate-pulse">🔄 Perlu ACC</span>`;
                        tombolAksi = `
                            <div class="flex items-center justify-center gap-2">
                                <button onclick="prosesKeputusanBooking(${booking.id}, 'Confirmed')" class="bg-emerald-600 hover:bg-emerald-700 text-white text-xs px-3 py-1.5 rounded font-medium transition shadow-sm">✅ ACC</button>
                                <button onclick="prosesKeputusanBooking(${booking.id}, 'Cancelled')" class="bg-red-50 hover:bg-red-100 text-red-600 text-xs px-3 py-1.5 rounded font-medium transition">❌ Tolak</button>
                            </div>
                        `;
                    } else if (booking.status === 'Confirmed') {
                        badgeStatus = `<span class="bg-emerald-50 text-emerald-700 border border-emerald-200 px-2.5 py-1 rounded-full text-xs font-bold">✅ Selesai / Di-ACC</span>`;
                        tombolAksi = `<span class="text-xs text-emerald-600 font-medium">Lunas & E-Ticket Aktif</span>`;
                    } else if (booking.status === 'Cancelled') {
                        badgeStatus = `<span class="bg-stone-100 text-stone-400 border border-stone-200 px-2.5 py-1 rounded-full text-xs font-medium">❌ Dibatalkan</span>`;
                        tombolAksi = `<span class="text-xs text-stone-400">Gagal / Kadaluwarsa</span>`;
                    }

                    tbody.innerHTML += `
                        <tr class="border-b border-stone-100 hover:bg-stone-50/50 transition">
                            <td class="p-4">
                                <span class="font-mono font-bold text-stone-900 block">#UBD-${booking.id}</span>
                                <span class="text-xs text-stone-800 font-medium">${booking.nama_tamu}</span>
                                <span class="text-[10px] text-stone-400 block font-mono">${booking.email_tamu}</span>
                            </td>
                            <td class="p-4 font-medium text-stone-700">${booking.tipe_villa}</td>
                            <td class="p-4 font-mono text-xs">
                                <span class="text-emerald-700 font-bold">${booking.tanggal_checkin}</span>
                                <span class="text-stone-400 mx-1">s/d</span>
                                <span class="text-red-700 font-bold">${booking.tanggal_checkout}</span>
                            </td>
                            <td class="p-4">${badgeStatus}</td>
                            <td class="p-4 text-center">${tombolAksi}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-600">Gagal memuat data dari database Supabase.</td></tr>`;
            }
        }

        // PROSES UP-DATE KEPUTUSAN STATUS RESERVASI
        async function prosesKeputusanBooking(id, statusBaru) {
            const pesanConf = statusBaru === 'Confirmed' ? "ACC dan terbitkan E-ticket untuk pesanan ini?" : "Tolak dan batalkan pesanan ini?";
            if (!confirm(pesanConf)) return;

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/reservasi_villa?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: statusBaru })
                });

                if (res.ok) {
                    alert(statusBaru === 'Confirmed' ? "Pemesanan berhasil di-ACC!" : "Pemesanan berhasil ditolak.");
                    ambilSemuaReservasi();
                } else {
                    alert("Gagal memperbarui status.");
                }
            } catch (e) {
                alert("Gangguan koneksi database.");
            }
        }

        function logout() { 
            localStorage.clear(); 
            window.location.href = '/'; 
        }
    </script>
</body>
</html>
