<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Admin Dashboard | Ubud Haven</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 text-stone-800 antialiased min-h-screen flex flex-col">

    <nav class="bg-stone-900 text-white px-6 py-4 flex items-center justify-between shadow-md">
        <div class="flex items-center space-x-3">
            <span class="text-xl font-serif tracking-widest font-bold">UBUD HAVEN</span>
            <span class="bg-stone-700 text-[10px] uppercase tracking-wider px-2 py-0.5 rounded text-stone-300">Staff Portal</span>
        </div>
        <div class="flex items-center space-x-4">
            <span id="adminEmail" class="text-xs text-stone-400 font-light">Loading admin...</span>
            <button onclick="logout()" class="bg-red-700 hover:bg-red-600 text-white text-xs px-3 py-1.5 rounded transition font-medium">LOGOUT</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto w-full px-4 py-8 flex-grow">
        <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
                <h1 class="text-2xl font-serif text-stone-900">Daftar Reservasi Villa</h1>
                <p class="text-xs text-stone-500 mt-1">Kelola data pemesanan direct booking secara real-time.</p>
            </div>
            <button onclick="ambilDaftarTamu()" class="w-fit bg-stone-900 hover:bg-stone-800 text-white text-xs px-4 py-2 rounded-lg font-medium shadow transition">
                🔄 Refresh Data
            </button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-stone-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-collapse">
                    <thead class="bg-stone-50 border-b border-stone-200 text-stone-500 text-xs uppercase tracking-wider font-medium">
                        <tr>
                            <th class="p-4">Nama Tamu</th>
                            <th class="p-4">Email</th>
                            <th class="p-4">Tipe Villa</th>
                            <th class="p-4">Check-In</th>
                            <th class="p-4">Check-Out</th>
                            <th class="p-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabelTamu" class="divide-y divide-stone-100 text-stone-700">
                        <tr>
                            <td colspan="6" class="p-8 text-center text-stone-400 text-sm">Sedang memuat data reservasi...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="bg-stone-50 border-t border-stone-200 text-center py-4 text-xs text-stone-400 font-light">
        &copy; 2026 Ubud Haven Development System. All rights reserved.
    </footer>

    <script>
        const SUPABASE_URL = "https://vvgchnwafsiouqsshrfb.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2Z2NobndhZnNpb3Vxc3NocmZiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4Mjc5NTA1NywiZXhwIjoyMDk4MzcxMDU3fQ.l87HFL8F4KGRhaAv64PXNfPY8awpoPItm8Y_QPS6cSY"; // Gunakan Key Supabase Anda yang kemarin

        // 1. CEK PROTEKSI KEAMANAN: Apakah user sudah login?
        const token = localStorage.getItem('supabase_token');
        if (!token) {
            // Jika tidak ada token akses, paksa tendang balik ke beranda
            alert("Akses ditolak! Silakan login terlebih dahulu.");
            window.location.href = 'index.html';
        }

        // 2. AMBIL DATA IDENTITAS PENGGUNA YANG SEDANG LOGIN
        async function dapatkanProfilAdmin() {
            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (!response.ok) throw new Error();
                const data = await response.json();
                document.getElementById('adminEmail').innerText = data.email;
                
            } catch (error) {
                // Jika token kedaluwarsa atau palsu, bersihkan memori dan tendang keluar
                logout();
            }
        }

        // 3. AMBIL SEMUA DATA RESERVASI TAMU DARI DATABASE
        async function ambilDaftarTamu() {
            const tbody = document.getElementById('tabelTamu');
            
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/reservasi_villa?select=*&order=id.desc`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) throw new Error();
                const data = await response.json();

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-stone-400 text-sm">Belum ada pemesanan masuk.</td></tr>`;
                    return;
                }

                // Bersihkan tabel lalu suntikkan data baru
                tbody.innerHTML = '';
                data.forEach(tamu => {
                    tbody.innerHTML += `
                        <tr class="hover:bg-stone-50 transition">
                            <td class="p-4 font-medium text-stone-900">${tamu.nama_tamu}</td>
                            <td class="p-4 text-xs text-stone-500">${tamu.email_tamu}</td>
                            <td class="p-4 text-stone-600 text-xs">${tamu.tipe_villa || '1-Bedroom Villa'}</td>
                            <td class="p-4 text-sm font-mono text-green-700">${tamu.tanggal_checkin}</td>
                            <td class="p-4 text-sm font-mono text-red-700">${tamu.tanggal_checkout}</td>
                            <td class="p-4 text-center">
                                <button onclick="hapusReservasi(${tamu.id})" class="bg-stone-100 hover:bg-red-50 text-stone-500 hover:text-red-600 p-1.5 rounded text-xs transition font-medium border border-stone-200 hover:border-red-200">
                                    Hapus
                                </button>
                            </td>
                        </tr>
                    `;
                });

            } catch (error) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-red-500 text-sm">Gagal memuat data dari server.</td></tr>`;
            }
        }

        // 4. FUNGSI HAPUS RESERVASI TAMU DARI DASBOR
        async function hapusReservasi(id) {
            if (!confirm("Apakah Anda yakin ingin menghapus data booking ini? Tindakan ini permanen.")) return;

            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/reservasi_villa?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    alert("Data booking berhasil dihapus!");
                    ambilDaftarTamu(); // Segarkan isi tabel
                } else {
                    throw new Error();
                }
            } catch (error) {
                alert("Gagal menghapus data. Silakan coba lagi.");
            }
        }

        // 5. FUNGSI LOGOUT KELUAR SISTEM
        function logout() {
            localStorage.removeItem('supabase_token');
            window.location.href = 'index.html';
        }

        // Jalankan fungsi otomatis saat halaman dibuka
        dapatkanProfilAdmin();
        ambilDaftarTamu();
    </script>
</body>
</html>
